
<h2 class="sr-only">Splash screen Rappi solo con wordmark centrado</h2>
<style>
.splash{width:100%;max-width:420px;height:250px;background:linear-gradient(145deg,#E84510 0%,#F0501E 45%,#FF3D6B 100%);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden;position:relative;margin:1rem auto}
.rw{animation:rBounce 1s cubic-bezier(0.36,0.07,0.19,0.97) both}
.rs{animation:rFade 0.5s ease 0.9s both;text-align:center}
.bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.3);animation:rBar 2.2s linear both;transform-origin:left}
@keyframes rBounce{0%{transform:scale(0.3);opacity:0}55%{transform:scale(1.08);opacity:1}75%{transform:scale(0.95)}90%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
@keyframes rFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes rBar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
</style>

<div class="splash">
  <div class="rw" id="rw">
    <p style="color:#fff;font-size:72px;font-weight:900;margin:0;letter-spacing:-3px;font-family:'Arial Black',Arial,sans-serif;line-height:1">rappi</p>
  </div>
  <div class="rs">
    <p style="color:rgba(255,255,255,0.82);font-size:13px;margin:0;letter-spacing:0.06em">Dashboard de disponibilidad de tiendas</p>
  </div>
  <div class="bar"></div>
</div>

<button onclick="(function(){var m=document.getElementById('rw');m.style.animation='none';void m.offsetWidth;m.style.animation='rBounce 1s cubic-bezier(0.36,0.07,0.19,0.97) both'})()" style="font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-sans);display:block;margin:.5rem auto">Repetir animación</button>
